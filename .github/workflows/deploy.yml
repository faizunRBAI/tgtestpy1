name: Deploy FastAPI to EC2

on:
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1 - test
  # ---------------------------------------------------------------------------
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest httpx

      - name: Lint (advisory only - never blocks deploy)
        run: |
          pip install flake8 || true
          flake8 . --max-line-length=120 --extend-ignore=E302,E303,W291,W293 || true

        continue-on-error: true
      - name: Run tests
        run: |
          if [ -d tests ] && compgen -G "tests/test_*.py" > /dev/null; then
            pytest tests/ -v
          else
            echo "No tests found - skipping"
          fi

  # ---------------------------------------------------------------------------
  # JOB 2 - build (provision infra with Terraform)
  # ---------------------------------------------------------------------------
  build:
    name: Terraform Provision
    runs-on: ubuntu-latest
    needs: test
    outputs:
      server_ip: ${{ steps.tf_output.outputs.server_ip }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      # Generate a fresh SSH key pair for this deployment
      - name: Generate SSH key pair
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t ed25519 -C "udap-deploy" -f ~/.ssh/deploy_key -N ""
          echo "SSH_PUBLIC_KEY=$(cat ~/.ssh/deploy_key.pub)" >> $GITHUB_ENV

      # Store the private key in S3 so the deploy job can retrieve it
      - name: Store SSH private key in S3
        run: |
          aws s3 cp ~/.ssh/deploy_key \
            s3://${{ secrets.TF_STATE_BUCKET }}/${{ secrets.PROJECT_NAME }}/deploy_key \
            --sse aws:kms

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan \
            -var="public_key=${SSH_PUBLIC_KEY}" \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Capture Terraform outputs
        id: tf_output
        working-directory: terraform
        run: |
          SERVER_IP=$(terraform output -raw instance_public_ip)
          echo "server_ip=${SERVER_IP}" >> $GITHUB_OUTPUT
          echo "SERVER_IP=${SERVER_IP}" >> $GITHUB_ENV

  # ---------------------------------------------------------------------------
  # JOB 3 - deploy (configure app with Ansible)
  # ---------------------------------------------------------------------------
  deploy:
    name: Ansible Configure & Deploy
    runs-on: ubuntu-latest
    needs: build

    env:
      SERVER_IP: ${{ needs.build.outputs.server_ip }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Retrieve SSH private key from S3
        run: |
          mkdir -p ~/.ssh
          aws s3 cp \
            s3://${{ secrets.TF_STATE_BUCKET }}/${{ secrets.PROJECT_NAME }}/deploy_key \
            ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Set up Python for Ansible
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: |
          pip install --upgrade pip
          pip install ansible

      - name: Wait for SSH to become available
        run: |
          echo "Waiting for SSH on ${SERVER_IP}..."
          for i in $(seq 1 30); do
            if ssh -i ~/.ssh/deploy_key \
                   -o StrictHostKeyChecking=no \
                   -o ConnectTimeout=5 \
                   -o BatchMode=yes \
                   ubuntu@${SERVER_IP} "echo ok" 2>/dev/null; then
              echo "SSH is ready."
              break
            fi
            echo "Attempt ${i}/30 - retrying in 10s..."
            sleep 10
          done

      - name: Run Ansible playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook ansible/playbook.yml \
            -i "${SERVER_IP}," \
            -u ubuntu \
            --private-key ~/.ssh/deploy_key \
            --extra-vars "project_name=${{ secrets.PROJECT_NAME }} aws_region=${{ secrets.AWS_REGION }} cw_log_group=/${{ secrets.PROJECT_NAME }}/app"

      # -----------------------------------------------------------------------
      # SELF-VERIFY - fail the job if the app does not answer with 2xx/3xx
      # -----------------------------------------------------------------------
      - name: Wait for app to be ready
        run: |
          echo "Waiting for application to respond at http://${SERVER_IP}/health ..."
          for i in $(seq 1 20); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                          --max-time 10 \
                          "http://${SERVER_IP}/health" || echo "000")
            echo "Attempt ${i}/20 - HTTP status: ${HTTP_STATUS}"
            if echo "${HTTP_STATUS}" | grep -qE '^[23][0-9][0-9]$'; then
              echo "Application is healthy (HTTP ${HTTP_STATUS})."
              exit 0
            fi
            sleep 15
          done
          echo "ERROR: Application did not return a 2xx/3xx after 20 attempts."
          exit 1

      # -----------------------------------------------------------------------
      # CLEANUP - remove the temporary deploy key from S3
      # -----------------------------------------------------------------------
      - name: Remove SSH private key from S3
        if: always()
        run: |-
          aws s3 rm \
            s3://${{ secrets.TF_STATE_BUCKET }}/${{ secrets.PROJECT_NAME }}/deploy_key \
            || true
